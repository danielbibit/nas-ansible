# === System ===
nas_admin: admin_override_example

nas_docker_uid: 1001
nas_docker_gid: 100
nas_docker_directory: /srv/Storage/System
nas_docker_compose_dir: /home/nas/containers/compose

# === Storage Paths ===
nas_library_dir: /srv/Storage/Library
nas_movie_directory: /srv/Storage/Library/Videos/Movies
nas_tv_directory: /srv/Storage/Library/Videos/Series
nas_music_directory: /srv/Storage/Library/Music
nas_photos_dir: /srv/Storage/Library/Pictures
nas_download_dir: /srv/Storage/Users/daniel/Downloads
nas_temp_download_dir: /srv/Users/Downloads/__temp
nas_backup_dir: /srv/Storage/Backups

seedbox_downloads_dir: /mnt/seedbox

# === create_users ===
system_groups:
  - { name: users, gid: 4200 }
  - { name: docker, gid: 4201 }

system_users:
  - { name: docker, uid: 1300, group: users }
  - { name: daniel, uid: 2311, group: users }
  - { name: valdedi, uid: 5136, group: users }
  - { name: barbara, uid: 6997, group: users }

# === email ===
email_report_to: example1@email.com
email_send_from: example2@email.com
email_account:
email_host:
email_username:
email_password:

# === cloudflare_ddns ===
cloudflare_ddns_enabled: true
cloudflare_ddns_api_key: token
cloudflare_ddns_zone: domain
cloudflare_ddns_subdomain: subdomain

# === dex ===
dex_enabled: true

# === Monitoring ===
grafana_enabled: true
node_exporter_enabled: true
prometheus_enabled: true
cadvisor_enabled: true
promtail_enabled: true
loki_enabled: true

prometheus_hass_token:
prometheus_hass_target:

# === qbittorrent ===
qbittorrent_enabled: true
qbittorrent_vpn_enabled: false

gluetun_wireguard_private_key: ""
gluetun_server_countries: "Netherlands"
gluetun_port_forwarding: false

# === plex ===
plex_enabled: true

# === jellyfin ===
jellyfin_enabled: true
jellyfin_public: false

# === arr_stack ===
arr_stack_enabled: true

# === nginx_proxy_manager ===
nginx_proxy_manager_enabled: true

# === traefik ===
traefik_enabled: false
traefik_domain: example.com
traefik_acme_email: example@email.com
traefik_cloudflare_api_token: "{{ cloudflare_ddns_api_key }}"
traefik_http_port: 80
traefik_https_port: 443
traefik_rules:
  - name: example-service
    host: service.example.com
    url: http://192.168.1.10:8080
    public: false

# === tailscale ===
tailscale_enabled: false
tailscale_authkey:
tailscale_routes:

# === cloudflared ===
cloudflared_enabled: false
cloudflared_token:
cloudflared_public_hostnames: []

# === syncthing ===
syncthing_enabled: false

# === immich ===
immich_enabled: true
immich_public: false

# === backup_immich ===
backup_immich_photos_path: "{{ nas_photos_dir }}"
backup_immich_aws_access_key_id:
backup_immich_aws_secret_access_key:
backup_immich_restic_repository_path:
backup_immich_restic_password:

# === watcharr ===
watcharr_enabled: false

# === samba ===
samba_shares:
  - name: Daniel
    path: /srv/Storage/Users/daniel
    browsable: 'yes'
    read_only: 'no'
    guest_ok: 'no'
    valid_users:
      - daniel

  - name: Scanner
    path: /srv/Storage/Scanner
    browsable: 'yes'
    read_only: 'no'
    guest_ok: 'no'
    valid_users:
      - daniel
      - barbara

# === rclone ===
rclone_enabled: true

rclone_remotes:
  - |
    [example_remote]
    type = sftp
    host = example.com
    user = exampleuser
    key_file = /home/nas/.ssh/id_ed25519
    shell_type = unix
    md5sum_command = md5sum

rclone_fstab:
  - name: example_remote
    remote: example_remote
    remote_path: ''
    mount_point: /mnt/example/remote
    uid: '{{ nas_docker_uid }}'
    gid: '{{ nas_docker_gid }}'
    umask: '0022'
    options: defaults,_netdev,allow_other,vfs-cache-mode=writes,buffer-size=128M
    dump: 0
    pass: 0
