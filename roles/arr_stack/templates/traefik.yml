http:
  routers:
    sonarr:
      rule: "Host(`sonarr.{{ traefik_domain }}`)"
      entryPoints:
        - websecure
      service: sonarr-svc
      tls:
        certResolver: cloudflare
{% if not arr_stack_sonarr_public | default(false) %}
      middlewares:
        - internal-only@file
{% endif %}

    radarr:
      rule: "Host(`radarr.{{ traefik_domain }}`)"
      entryPoints:
        - websecure
