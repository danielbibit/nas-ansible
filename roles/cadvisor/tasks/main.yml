---
- name: Start stack
  when: cadvisor_enabled is true
  block:
    - name: Make sure compose directory exists
      ansible.builtin.file:
        path: '{{ nas_docker_compose_dir }}/cadvisor'
        state: directory
        owner: '{{ nas_docker_uid }}'
        group: '{{ nas_docker_gid }}'
        mode: "0775"

    - name: Copy compose
      ansible.builtin.template:
        src: '{{ role_path }}/templates/docker-compose.yml'
        dest: '{{ nas_docker_compose_dir }}/cadvisor/docker-compose.yml'
        owner: '{{ nas_docker_uid }}'
        group: '{{ nas_docker_gid }}'
        mode: "0775"

    - name: Start stack
      community.docker.docker_compose_v2:
        project_src: '{{ nas_docker_compose_dir }}/cadvisor'
        state: present
        pull: missing
        remove_orphans: true

    - name: Deploy Traefik route for cadvisor
      ansible.builtin.template:
        src: '{{ role_path }}/templates/traefik.yml'
        dest: '{{ nas_docker_directory }}/traefik/dynamic/cadvisor.yml'
        owner: '{{ nas_docker_uid }}'
        group: '{{ nas_docker_gid }}'
        mode: "0644"
      when: traefik_enabled | default(false)

- name: Stop stack
  when: cadvisor_enabled is false
  block:
    - name: Tear down existing stack
      community.docker.docker_compose_v2:
        project_src: '{{ nas_docker_compose_dir }}/cadvisor'
        state: absent

    - name: Remove compose files
      ansible.builtin.file:
        path: '{{ nas_docker_compose_dir }}/cadvisor'
        state: absent

    - name: Remove Traefik route for cadvisor
      ansible.builtin.file:
        path: '{{ nas_docker_directory }}/traefik/dynamic/cadvisor.yml'
        state: absent
