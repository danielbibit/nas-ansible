---
- name: Start stack
  when: dex_enabled is true
  block:
    - name: Make sure nas default network exists
      community.docker.docker_network:
        name: nas
        state: present

    - name: Make sure compose directory exists
      ansible.builtin.file:
        path: '{{ nas_docker_compose_dir }}/dex'
        state: directory
        owner: '{{ nas_docker_uid }}'
        group: '{{ nas_docker_gid }}'
        mode: "0775"

    - name: Copy compose
      ansible.builtin.template:
        src: '{{ role_path }}/templates/docker-compose.yml'
        dest: '{{ nas_docker_compose_dir }}/dex/docker-compose.yml'
        owner: '{{ nas_docker_uid }}'
        group: '{{ nas_docker_gid }}'
        mode: "0775"

    - name: Start stack
      community.docker.docker_compose_v2:
        project_src: '{{ nas_docker_compose_dir }}/dex'
        state: present
        pull: missing
        remove_orphans: true

    - name: Deploy Traefik route for dex
      ansible.builtin.template:
        src: '{{ role_path }}/templates/traefik.yml'
        dest: '{{ nas_docker_directory }}/traefik/dynamic/dex.yml'
        owner: '{{ nas_docker_uid }}'
        group: '{{ nas_docker_gid }}'
        mode: "0644"
      when: traefik_enabled | default(false)

- name: Stop stack
  when: dex_enabled is false
  block:
    - name: Check if compose directory exists
      ansible.builtin.stat:
        path: '{{ nas_docker_compose_dir }}/dex'
      register: _dex_dir

    - name: Tear down existing stack
      community.docker.docker_compose_v2:
        project_src: '{{ nas_docker_compose_dir }}/dex'
        state: absent
      when: _dex_dir.stat.exists and _dex_dir.stat.isdir

    - name: Remove compose files
      ansible.builtin.file:
        path: '{{ nas_docker_compose_dir }}/dex'
        state: absent

    - name: Remove Traefik route for dex
      ansible.builtin.file:
        path: '{{ nas_docker_directory }}/traefik/dynamic/dex.yml'
        state: absent
