http:
  routers:
    grafana:
      rule: "Host(`grafana.{{ traefik_domain }}`)"
      entryPoints:
        - websecure
      service: grafana-svc
      tls:
        certResolver: cloudflare
{% if not grafana_public | default(false) %}
      middlewares:
        - internal-only@file
{% endif %}
  services:
    grafana-svc:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"
